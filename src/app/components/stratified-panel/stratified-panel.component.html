<section class="panel">
  <div class="panel-header">
    <h2 class="section-title">Muestreo estratificado</h2>
    <span class="pill">Asignacion proporcional</span>
  </div>

  <div class="panel-body">
    <form (ngSubmit)="calculate()">
      <div class="form-grid">
        <div class="field">
          <label for="str-confidence">Confianza</label>
          <select id="str-confidence" name="confidence" [(ngModel)]="confidence">
            <option [ngValue]="90">90%</option>
            <option [ngValue]="95">95%</option>
            <option [ngValue]="98">98%</option>
            <option [ngValue]="99">99%</option>
          </select>
        </div>

        <div class="field">
          <label for="str-proportion">Proporcion p</label>
          <input id="str-proportion" name="proportion" type="number" min="1" max="99" step="0.1" [(ngModel)]="proportion">
        </div>

        <div class="field">
          <label for="str-error">Error e</label>
          <input id="str-error" name="marginError" type="number" min="0.1" max="30" step="0.1" [(ngModel)]="marginError">
        </div>
      </div>

      <div class="strata-list">
        <div class="stratum-row" *ngFor="let stratum of strata; let index = index">
          <div class="field">
            <label [for]="'stratum-name-' + stratum.id">Estrato</label>
            <input [id]="'stratum-name-' + stratum.id" [name]="'name' + stratum.id" type="text" [(ngModel)]="stratum.name">
          </div>
          <div class="field">
            <label [for]="'stratum-population-' + stratum.id">Poblacion</label>
            <input [id]="'stratum-population-' + stratum.id" [name]="'population' + stratum.id" type="number" min="1" [(ngModel)]="stratum.population">
          </div>
          <button class="btn btn-ghost" type="button" (click)="removeStratum(stratum.id)" [disabled]="strata.length === 1">
            Quitar
          </button>
        </div>
      </div>

      <div class="button-row">
        <button class="btn btn-secondary" type="button" (click)="addStratum()">Agregar estrato</button>
        <button class="btn btn-primary" type="submit">Calcular</button>
      </div>
    </form>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <app-result-panel
      [result]="result"
      title="Muestra total"
      [extraSummary]="resultSummary"
    ></app-result-panel>

    <table class="data-table allocations" *ngIf="result">
      <thead>
        <tr>
          <th>Estrato</th>
          <th>Poblacion</th>
          <th>Peso</th>
          <th>Exacto</th>
          <th>Muestra</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let allocation of result.allocations">
          <td>{{ allocation.name }}</td>
          <td>{{ allocation.population }}</td>
          <td>{{ allocation.weight | percent: '1.1-1' }}</td>
          <td>{{ allocation.exactSample | number: '1.2-2' }}</td>
          <td>{{ allocation.sample }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
